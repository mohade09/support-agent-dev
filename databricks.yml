bundle:
  name: support-agent-ui

sync:
  include:
    - .build

# Build is handled by deploy.sh (apx build runs on the laptop and the
# resulting .build/ is uploaded). Do NOT define `artifacts.<x>.build` here
# or `bundle deploy` will try to rebuild on every host — which fails in a
# Databricks workspace shell that doesn't have apx on PATH.

resources:
  apps:
    support-agent-ui-app:
      name: "support-agent-ui"
      description: "Voltway support workspace (agent + supervisor)"
      source_code_path: ./.build

      # OAuth scopes requested at SSO time so the user's token can be
      # forwarded (X-Forwarded-Access-Token) when auth_mode is obo or auto.
      # These drive the SSO consent dialog and determine what the
      # user-on-behalf-of token can access.
      user_api_scopes:
        - serving.serving-endpoints
        - dashboards.genie
        - sql

      resources:
        # Replace with your Mosaic AI Agent Bricks endpoint name.
        - name: "serving-endpoint"
          serving_endpoint:
            name: "<YOUR_AGENT_ENDPOINT_NAME>"
            permission: "CAN_QUERY"

        # The resources below (sql-warehouse + genie-space) attach with the
        # app's service principal. They are only required when running in
        # auth_mode=app_sp — i.e. the backend calls Genie / SQL warehouses
        # directly using the app SP. For OBO (default), these are unused
        # because the agent endpoint accesses Genie + warehouses via its
        # own EMBEDDED_CREDENTIALS, not the app SP. Uncomment if you switch
        # to auth_mode=app_sp.
        #
        # # Replace with your SQL warehouse ID
        # # (databricks warehouses list -o json | jq '.[].id').
        # - name: "sql-warehouse"
        #   sql_warehouse:
        #     id: "<YOUR_SQL_WAREHOUSE_ID>"
        #     permission: "CAN_USE"
        #
        # # Replace with your Genie Room ID (from /genie/rooms/<id> URL).
        # - name: "genie-space"
        #   genie_space:
        #     name: "Support Agent Genie"
        #     space_id: "<YOUR_GENIE_SPACE_ID>"
        #     permission: "CAN_RUN"
        #
        # # Replace with the Genie Room ID for return-policy analytics.
        # - name: "genie-space-returns"
        #   genie_space:
        #     name: "Return Policy Analytics"
        #     space_id: "<YOUR_RETURNS_GENIE_SPACE_ID>"
        #     permission: "CAN_RUN"

        # knowledge-assistant (ka-19637755-endpoint) requires MANAGE permission
        # on the endpoint to attach. Re-add once granted.

        # UC data grants for the app's service principal are managed at
        # the schema level via setup-grants.sql (bundle uc_securable does
        # not support SCHEMA scope). Run setup-grants.sql once after
        # deploy to grant USE_CATALOG / USE_SCHEMA / SELECT on
        # debadm.shopflow_demo and debadm.ecom_gold.




targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://<your-workspace>.cloud.databricks.com
